<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS99 Community - Coinflip</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Poppins',sans-serif;padding:24px} .panel{max-width:480px;margin:0 auto}</style>
</head>
<body>
  <div class="panel">
	<h2>Coinflip</h2>
	<label>Wähle: <select id="side"><option value="heads">Heads</option><option value="tails">Tails</option></select></label>
	<br><label>Einsatz: <input id="amount" type="number" value="10" min="1"></label>
	<br><button id="betBtn">Wetten</button>
	<p id="result"></p>
  </div>

  <script>
	document.getElementById('betBtn').addEventListener('click', async () => {
	  const side = document.getElementById('side').value;
	  const amount = Number(document.getElementById('amount').value);
	  const res = await fetch('/api/game/coinflip', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({side, amount})});
	  const data = await res.json();
	  if(res.ok) document.getElementById('result').textContent = `Result: ${data.result} — Win: ${data.win}`;
	  else document.getElementById('result').textContent = data.error || 'Fehler';
	});
  </script>
</body>
</html>
